<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitOps 設定檔檢視器</title>
<style>
  :root{
    --bg: #0b1220;
    --panel: #111b2e;
    --panel-2: #16223a;
    --line: #233453;
    --text: #dbe6f5;
    --text-dim: #87a0c4;
    --accent: #5ee6c5;
    --danger: #ef6b6b;
    --mono: "SFMono-Regular","Consolas","Liberation Mono",Menlo,monospace;
    --sans: "Inter","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background: radial-gradient(1200px 600px at 80% -10%, #14213b 0%, var(--bg) 60%);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  /* ---------- 口令鎖定畫面 ---------- */
  .gate{
    width:100%;
    max-width:420px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:36px 32px;
    box-shadow:0 30px 80px -30px rgba(0,0,0,.6);
  }
  .gate .lock{
    width:42px;height:42px;border-radius:10px;
    background:linear-gradient(135deg,var(--accent),#2fae8e);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:18px;
    font-size:20px;
  }
  .gate h1{font-size:19px;margin:0 0 6px;letter-spacing:.2px;}
  .gate p{color:var(--text-dim);font-size:13px;margin:0 0 22px;line-height:1.6;}
  .gate input{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 14px;
    color:var(--text);
    font-size:14px;
    font-family:var(--mono);
    outline:none;
  }
  .gate input:focus{border-color:var(--accent);}
  .gate button{
    margin-top:14px;
    width:100%;
    background:var(--accent);
    color:#06241c;
    border:none;
    border-radius:8px;
    padding:12px;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    letter-spacing:.2px;
  }
  .gate button:hover{filter:brightness(1.05);}
  .gate .err{color:var(--danger);font-size:12.5px;margin-top:10px;min-height:16px;}

  /* ---------- 主畫面 ---------- */
  .app{display:none;width:100%;max-width:980px;}
  .app.show{display:block;}
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px;
    margin-bottom:18px;
  }
  .topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;}
  .topbar h1{font-size:18px;margin:0;}
  .topbar .badge{font-family:var(--mono);font-size:11.5px;color:var(--accent);border:1px solid #1e4a3f;background:#0f231d;padding:3px 9px;border-radius:20px;}
  .sub{color:var(--text-dim);font-size:12.5px;margin:6px 0 24px;}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field.full{grid-column:1 / -1;}
  label{font-size:12px;color:var(--text-dim);letter-spacing:.3px;display:flex;justify-content:space-between;}
  label .tag{font-family:var(--mono);font-size:10.5px;color:#5a7396;}
  select,input[type=text],input[type=password]{
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:8px;
    padding:10px 12px;
    font-size:13.5px;
    font-family:var(--mono);
    outline:none;
  }
  select:disabled{opacity:.45;cursor:not-allowed;}
  select:focus,input:focus{border-color:var(--accent);}
  select{appearance:none;cursor:pointer;}
  .row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;align-items:center;}
  button.btn{
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:10px 16px;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
    font-weight:500;
  }
  button.btn:hover{border-color:var(--accent);color:var(--accent);}
  button.btn.primary{
    background:var(--accent);
    color:#06241c;
    border-color:var(--accent);
    font-weight:600;
  }
  button.btn.primary:hover{filter:brightness(1.05);color:#06241c;}
  button.btn:disabled{opacity:.4;cursor:not-allowed;}

  .status{font-size:12.5px;margin-top:14px;color:var(--text-dim);min-height:18px;}
  .status.err{color:var(--danger);}
  .status.ok{color:var(--accent);}

  .result-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .result-head .path{font-family:var(--mono);font-size:12px;color:var(--text-dim);word-break:break-all;}
  pre{
    background:#070d18;
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px;
    overflow:auto;
    max-height:520px;
    font-family:var(--mono);
    font-size:12.5px;
    line-height:1.6;
    color:#cfe3f7;
    margin:0;
  }
  .hint{font-size:11.5px;color:var(--text-dim);margin-top:8px;line-height:1.6;}
  .custom-toggle{font-size:11.5px;color:var(--accent);cursor:pointer;margin-top:14px;display:inline-block;}
  @media (max-width:640px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

  <!-- 口令鎖定畫面 -->
  <div class="gate" id="gate">
    <div class="lock">🔒</div>
    <h1>GitOps 設定檔檢視器</h1>
    <p>請輸入口令以繼續。此頁面用於讀取 kuboard_gitops 內各專案環境的設定檔內容。</p>
    <input type="password" id="passcode" placeholder="輸入口令" autocomplete="off">
    <button id="gateBtn">進入</button>
    <div class="err" id="gateErr"></div>
  </div>

  <!-- 主畫面 -->
  <div class="app" id="app">

    <div class="card">
      <div class="topbar">
        <h1>GitOps 設定檔檢視器</h1>
        <span class="badge">kuboard_gitops · main</span>
      </div>
      <div class="sub">點「載入清單」抓出所有專案，逐層選擇環境 / 服務 / 檔案，最後按「完成」輸出內容</div>

      <div class="grid">
        <div class="field full">
          <label>GitLab 路徑（namespace/project）</label>
          <input type="text" id="gitlabProject" value="hi_devops/kuboard_gitops">
        </div>

        <div class="field">
          <label>專案 (project) <span class="tag">game_project/*</span></label>
          <select id="project" disabled><option value="">— 先載入清單 —</option></select>
        </div>
        <div class="field">
          <label>環境 (environment) <span class="tag">overlays/*</span></label>
          <select id="env" disabled><option value="">— 先選擇專案 —</option></select>
        </div>
        <div class="field">
          <label>服務 (service)</label>
          <select id="service" disabled><option value="">— 先選擇環境 —</option></select>
        </div>
        <div class="field">
          <label>設定檔 (conf 目錄)</label>
          <select id="file" disabled><option value="">— 先選擇服務 —</option></select>
        </div>
      </div>

      <div class="row">
        <button class="btn primary" id="loadAll">載入清單</button>
        <button class="btn primary" id="finishBtn" disabled>完成 — 輸出結果</button>
        <span class="status" id="status"></span>
      </div>

      <span class="custom-toggle" id="manualToggle">手動指定完整路徑 ▾</span>
      <div class="field full" id="manualPathBox" style="display:none;margin-top:10px;">
        <label>完整檔案路徑（相對於 repo 根目錄）</label>
        <input type="text" id="manualPath" placeholder="game_project/pp/game_project/overlays/stage/cerberus-backend-api-backend/conf/config.yaml">
        <button class="btn" id="loadManual" style="margin-top:8px;width:fit-content;">讀取此路徑</button>
      </div>
    </div>

    <div class="card" id="resultCard" style="display:none;">
      <div class="result-head">
        <strong>設定檔內容</strong>
        <span class="path" id="resultPath"></span>
      </div>
      <pre id="resultContent"></pre>
    </div>

  </div>

<script>
(function(){
  const PASSCODE = "Trevi.cc";
  // ⚠️ Token 直接內嵌，僅供內部工具使用，請勿外流此檔案。
  const TOKEN = "srx63w_RL9DsSffAagdE";

  const gate = document.getElementById('gate');
  const app = document.getElementById('app');
  const gateErr = document.getElementById('gateErr');

  document.getElementById('gateBtn').addEventListener('click', tryEnter);
  document.getElementById('passcode').addEventListener('keydown', e=>{ if(e.key==='Enter') tryEnter(); });

  function tryEnter(){
    const v = document.getElementById('passcode').value.trim();
    if(v === PASSCODE){
      gate.style.display = 'none';
      app.classList.add('show');
    } else {
      gateErr.textContent = '口令錯誤，請重新輸入。';
    }
  }

  document.getElementById('manualToggle').addEventListener('click', ()=>{
    const box = document.getElementById('manualPathBox');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
  });

  // ---- GitLab API 輔助函式 ----
  function apiBase(){
    const proj = document.getElementById('gitlabProject').value.trim();
    const encoded = proj.split('/').map(encodeURIComponent).join('%2F');
    return `https://git.trevi.cc/api/v4/projects/${encoded}`;
  }

  async function listTree(path){
    const url = `${apiBase()}/repository/tree?path=${encodeURIComponent(path)}&ref=main&per_page=100&private_token=${encodeURIComponent(TOKEN)}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error(`目錄讀取失敗 (HTTP ${res.status})：${path}`);
    return await res.json();
  }

  async function fetchRaw(filePath){
    const encodedPath = encodeURIComponent(filePath);
    const url = `${apiBase()}/repository/files/${encodedPath}/raw?ref=main&private_token=${encodeURIComponent(TOKEN)}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error(`檔案讀取失敗 (HTTP ${res.status})：${filePath}`);
    return await res.text();
  }

  function setStatus(text, type){
    const el = document.getElementById('status');
    el.textContent = text || '';
    el.className = 'status' + (type ? ' '+type : '');
  }

  function fillSelect(id, items, placeholder){
    const sel = document.getElementById(id);
    if(items.length === 0){
      sel.innerHTML = `<option value="">（無項目）</option>`;
      sel.disabled = true;
      return false;
    }
    sel.innerHTML = `<option value="">${placeholder}</option>` +
      items.map(n => `<option value="${n}">${n}</option>`).join('');
    sel.disabled = false;
    return true;
  }

  function resetDownstream(fromLevel){
    // fromLevel: 'env' | 'service' | 'file'
    const order = ['env','service','file'];
    const idx = order.indexOf(fromLevel);
    for(let i=idx;i<order.length;i++){
      const sel = document.getElementById(order[i]);
      sel.innerHTML = '<option value="">— 請先完成上一步 —</option>';
      sel.disabled = true;
    }
    document.getElementById('finishBtn').disabled = true;
  }

  // ---- 載入清單：抓出所有專案 ----
  document.getElementById('loadAll').addEventListener('click', async ()=>{
    setStatus('載入專案清單中…');
    document.getElementById('project').disabled = true;
    resetDownstream('env');
    try{
      const items = await listTree('game_project');
      const projects = items.filter(i => i.type === 'tree').map(i => i.name);
      const ok = fillSelect('project', projects, '— 選擇專案 —');
      setStatus(ok ? `已載入 ${projects.length} 個專案` : '找不到任何專案目錄', ok ? 'ok' : 'err');
    }catch(err){
      document.getElementById('project').innerHTML = '<option value="">讀取失敗</option>';
      setStatus(err.message, 'err');
    }
  });

  // ---- 選專案 -> 自動載入環境 ----
  document.getElementById('project').addEventListener('change', async ()=>{
    const project = document.getElementById('project').value;
    resetDownstream('env');
    if(!project) return;
    setStatus('載入環境清單中…');
    try{
      const path = `game_project/${project}/game_project/overlays`;
      const items = await listTree(path);
      const envs = items.filter(i => i.type === 'tree').map(i => i.name);
      const ok = fillSelect('env', envs, '— 選擇環境 —');
      setStatus(ok ? `已載入 ${envs.length} 個環境` : '此專案下找不到環境目錄', ok ? 'ok' : 'err');
    }catch(err){
      document.getElementById('env').innerHTML = '<option value="">讀取失敗</option>';
      setStatus(err.message, 'err');
    }
  });

  // ---- 選環境 -> 自動載入服務 ----
  document.getElementById('env').addEventListener('change', async ()=>{
    const project = document.getElementById('project').value;
    const env = document.getElementById('env').value;
    resetDownstream('service');
    if(!env) return;
    setStatus('載入服務清單中…');
    try{
      const path = `game_project/${project}/game_project/overlays/${env}`;
      const items = await listTree(path);
      const services = items.filter(i => i.type === 'tree').map(i => i.name);
      const ok = fillSelect('service', services, '— 選擇服務 —');
      setStatus(ok ? `已載入 ${services.length} 個服務` : '此環境下找不到服務目錄', ok ? 'ok' : 'err');
    }catch(err){
      document.getElementById('service').innerHTML = '<option value="">讀取失敗</option>';
      setStatus(err.message, 'err');
    }
  });

  // ---- 選服務 -> 自動載入 conf 檔案 ----
  document.getElementById('service').addEventListener('change', async ()=>{
    const project = document.getElementById('project').value;
    const env = document.getElementById('env').value;
    const service = document.getElementById('service').value;
    resetDownstream('file');
    if(!service) return;
    setStatus('載入檔案清單中…');
    try{
      const path = `game_project/${project}/game_project/overlays/${env}/${service}/conf`;
      const items = await listTree(path);
      const files = items.filter(i => i.type === 'blob').map(i => i.name);
      const ok = fillSelect('file', files, '— 選擇檔案 —');
      setStatus(ok ? `已載入 ${files.length} 個檔案` : 'conf 目錄下沒有檔案', ok ? 'ok' : 'err');
    }catch(err){
      document.getElementById('file').innerHTML = '<option value="">讀取失敗</option>';
      setStatus(err.message, 'err');
    }
  });

  // ---- 選檔案 -> 啟用完成按鈕 ----
  document.getElementById('file').addEventListener('change', ()=>{
    document.getElementById('finishBtn').disabled = !document.getElementById('file').value;
  });

  // ---- 完成 -> 輸出結果 ----
  document.getElementById('finishBtn').addEventListener('click', async ()=>{
    const project = document.getElementById('project').value;
    const env = document.getElementById('env').value;
    const service = document.getElementById('service').value;
    const file = document.getElementById('file').value;
    if(!project || !env || !service || !file) return;
    const fullPath = `game_project/${project}/game_project/overlays/${env}/${service}/conf/${file}`;
    await loadAndShow(fullPath);
  });

  document.getElementById('loadManual').addEventListener('click', async ()=>{
    const p = document.getElementById('manualPath').value.trim();
    if(!p) return;
    await loadAndShow(p);
  });

  async function loadAndShow(fullPath){
    setStatus('讀取設定檔內容中…');
    try{
      const content = await fetchRaw(fullPath);
      document.getElementById('resultCard').style.display = 'block';
      document.getElementById('resultPath').textContent = fullPath;
      document.getElementById('resultContent').textContent = content;
      setStatus('讀取成功', 'ok');
      document.getElementById('resultCard').scrollIntoView({behavior:'smooth', block:'start'});
    }catch(err){
      setStatus(err.message, 'err');
    }
  }
})();
</script>
</body>
</html>
